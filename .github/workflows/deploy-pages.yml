name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages デプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新の1本だけに（古いデプロイはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        # enablement: true で Pages を未設定でも自動有効化
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build (base = /voiceforge/)
        run: npm run build
        env:
          GHPAGES_BASE: /voiceforge/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
